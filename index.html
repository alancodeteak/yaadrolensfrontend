<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" href="/assets/yaadrolens-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YaadroLens Admin</title>
    <meta name="description" content="Comprehensive admin management system for user management, payroll, attendance, and reporting" />
    <link rel="preload" href="/assets/yaadrolens-logo.png" as="image" type="image/png" />
    <!-- Regional Noto fonts only — Inter is self-hosted via @fontsource -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans+Kannada:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans+Kannada:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        color: #1f2937;
        background-color: #f9fafb;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
        background-color: #f9fafb;
      }
      .app-boot {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        color: #6b7280;
        font-size: 0.875rem;
      }
      /* Dashboard LCP */
      .dashboard-page {
        max-width: 80rem;
        margin-left: auto;
        margin-right: auto;
        padding: 2rem 1rem;
      }
      .dashboard-title {
        margin: 0;
        font-size: 1.875rem;
        line-height: 2.25rem;
        font-weight: 700;
        color: #111827;
      }
      .dashboard-subtitle-slot {
        min-height: 2.75rem;
      }
      .dashboard-widget-slot {
        min-height: 9.5rem;
        contain: layout;
      }
      .dashboard-panel-slot {
        min-height: 24rem;
        contain: layout;
      }
      /* Login LCP */
      .login-page {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        padding: 2.5rem 1rem;
      }
      .login-title {
        margin: 0.75rem 0 0;
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 700;
        color: #111827;
        text-align: center;
      }
      .login-card {
        width: 100%;
        max-width: 28rem;
        min-height: 22rem;
        border-radius: 1rem;
        border: 1px solid rgb(229 231 235 / 0.6);
        background: #fff;
        padding: 1.5rem;
        box-shadow: 0 2px 16px rgb(0 0 0 / 0.06);
        contain: layout;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot" role="status" aria-live="polite">Loading YaadroLens…</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
