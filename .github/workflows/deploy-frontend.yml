# Deploy org-admin SPA to GCS on push to main (merge to main triggers push).
name: Deploy org frontend (dev)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-org-frontend-dev
  cancel-in-progress: false

env:
  PROJECT_ID: yaadro-lens
  GCS_BUCKET: yaadro-lens-lens-dev-org-web
  FRONTEND_URL: http://34.110.234.3/

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEPLOY_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload dist to GCS
        run: |
          set -euo pipefail
          gcloud storage rsync -r --delete-unmatched-destination-objects dist "gs://${GCS_BUCKET}"
          gcloud storage objects update "gs://${GCS_BUCKET}/index.html" \
            --cache-control="no-cache, max-age=0"

      - name: Smoke test
        run: |
          set -euo pipefail
          for i in $(seq 1 10); do
            if curl -fsSI "${FRONTEND_URL}" | head -1 | grep -qE '200|301|302'; then
              echo "Frontend smoke test passed"
              exit 0
            fi
            echo "Waiting for frontend... (${i}/10)"
            sleep 10
          done
          echo "Frontend smoke test failed"
          exit 1
