substitutions:
  _GCS_BUCKET: yaadro-lens-lens-dev-org-web

steps:
  - id: install
    name: node:20
    entrypoint: npm
    args: ['ci']

  - id: build
    name: node:20
    entrypoint: npm
    args: ['run', 'build']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud storage rsync -r --delete-unmatched-destination-objects dist gs://${_GCS_BUCKET}
        gcloud storage objects update gs://${_GCS_BUCKET}/index.html \
          --cache-control="no-cache, max-age=0"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
